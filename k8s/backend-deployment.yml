kind: Deployment
apiVersion: apps/v1
metadata:
  name: backend-deployment
  namespace: chat-app

spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      name: backend-pod
      namespace: chat-app
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: drishandwivedi/chatapp-backend
          ports:
          - containerPort: 5001
          env:
            - name: NODE_ENV 
              value: "production" 
          
            - name: PORT
              value: "5001"

            - name: MONGODB_URI
              value: "mongodb://mongoadmin:secret@mongodb-service:27017/chatapp?authSource=admin"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: chatapp-secrets
                  key: jwt
          
